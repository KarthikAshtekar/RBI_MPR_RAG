reports_registry: configs/reports.yaml
index:
  collection_name: rbi_mpr_multi_report
  persistence_path: indexes/multi_report/chroma
  manifest_path: indexes/multi_report/index_manifest.json
embedding_model: sentence-transformers/all-MiniLM-L6-v2
reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
chunking:
  chunk_size: 1000
  chunk_overlap: 300
  ingestion_version: multi_v1
retrieval:
  dense_k_per_report: 15
  bm25_k_per_report: 15
  fusion_rrf_k: 60
  reranker_candidate_k_per_report: 15
  final_k_single_report: 4
  final_k_per_report_comparative: 3
  final_k_per_report_trend: 2
router:
  use_llm_fallback: false
generation:
  model: llama-3.1-8b-instant
  temperature: 0
  prompt_version: comparative_v1
evaluation:
  bootstrap_resamples: 2000
  confidence_level: 0.95
  random_seed: 42
  router_cases: data/evaluation/router_cases.jsonl
  router_test_cases: data/evaluation/router_test.jsonl
  dev_cases: data/evaluation/multi_report_dev.jsonl
  test_cases: data/evaluation/multi_report_test.jsonl
  output_directory: reports/multi_report
comparison:
  enable_naive_global_baseline: true
audit:
  output_json: reports/multi_report/extraction_audit.json
  output_markdown: reports/multi_report/extraction_audit.md
