registry_version: retrieval_optimisation_v1
selection_objectives: [complete_evidence_recall, all_reports_hit_rate, evidence_recall, macro_report_mrr, median_latency]
experiments:
  - experiment_id: temporal_baseline
    description: Frozen Phase 5 report-aware baseline
    parent_experiment: null
    enabled: true
    parser: pypdf
    chunking: {size: 1000, overlap: 300}
    embedding: sentence-transformers/all-MiniLM-L6-v2
    query_transform: none
    dense_retrieval: {k: 15}
    bm25: {k: 15, preprocessing: baseline}
    fusion: {method: rrf, k: 60, dense_weight: 1.0, bm25_weight: 1.0}
    reranker: {model: cross-encoder/ms-marco-MiniLM-L-6-v2, candidates: 15}
    context_selection: {single: 4, pairwise_per_report: 3, trend_per_report: 2}
    deduplication: coverage_preserving
    evaluation: {split: dev, bootstrap_resamples: 2000, seed: 42}
  - experiment_id: candidate_pool_30
    description: Larger candidate generation and reranker pool
    parent_experiment: temporal_baseline
    enabled: true
    parser: pypdf
    chunking: {size: 1000, overlap: 300}
    embedding: sentence-transformers/all-MiniLM-L6-v2
    query_transform: none
    dense_retrieval: {k: 30}
    bm25: {k: 30, preprocessing: baseline}
    fusion: {method: rrf, k: 60, dense_weight: 1.0, bm25_weight: 1.0}
    reranker: {model: cross-encoder/ms-marco-MiniLM-L-6-v2, candidates: 30}
    context_selection: {single: 4, pairwise_per_report: 3, trend_per_report: 2}
    deduplication: coverage_preserving
    evaluation: {split: dev, bootstrap_resamples: 2000, seed: 42}

