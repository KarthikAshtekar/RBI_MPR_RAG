    top_n: 30
  context_selection:
    single: 6
    pairwise: 5
    trend: 4
    structural_mode: none
  index:
    source: v2_unstructured_chroma
    path: indexes/v2_unstructured_cohere/unstructured_chroma
  evaluation:
    split: dev
    heldout_loaded: false

V2_COHERE_ONLY:
  description: PyPDFLoader extraction with Cohere Rerank.
