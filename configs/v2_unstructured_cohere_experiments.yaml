V2_BASELINE_FINAL:
  description: Current frozen final retrieval setup using PyPDFLoader and local cross-encoder reranker.
  enabled: true
  parser:
    provider: pypdfloader
    name: PyPDFLoader
  embedding:
    model: sentence-transformers/all-MiniLM-L6-v2
  retrieval:
    dense_k: 50
    bm25_k: 50
  fusion:
    method: rrf
    k: 60
    retain: 30
  reranker:
    provider: local_cross_encoder
    model: cross-encoder/ms-marco-MiniLM-L-6-v2
    top_n: 30
  context_selection:
    single: 6
    pairwise: 5
    trend: 4
    structural_mode: none
  index:
    source: existing_multi_report_chroma
    path: indexes/multi_report/chroma
  evaluation:
    split: dev
    heldout_loaded: false

V2_UNSTRUCTURED_ONLY:
  description: Layout-aware Unstructured extraction with the same local cross-encoder reranker.
  enabled: true
  parser:
    provider: unstructured
    name: Unstructured
  embedding:
    model: sentence-transformers/all-MiniLM-L6-v2
  retrieval:
    dense_k: 50
    bm25_k: 50
  fusion:
    method: rrf
    k: 60
    retain: 30
  reranker:
