description: Child retrieval with page-bounded parent windows.
parent_experiment: stage_a_selected_reference
enabled: true
parser:
  name: pypdfloader
  status: active
chunking:
  strategy: child_parent
  child_size: 600
  child_overlap: 120
  parent_strategy: page_bounded_parent
  parent_max_chars: 1600
index:
  type: existing_multi_report_chroma
  path: indexes/multi_report/chroma
embedding:
  model: sentence-transformers/all-MiniLM-L6-v2
retrieval:
  dense_k: 50
  bm25_k: 50
bm25:
  preprocessing: current
fusion:
  method: rrf
  k: 60
  retain: 30
reranker:
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
context_selection:
  single: 6
  pairwise: 5
  trend: 4
  structural_mode: child_parent
deduplication:
  strategy: exact_text_per_report
evaluation:
  split: dev
  heldout_loaded: false
id: CPARENT03
